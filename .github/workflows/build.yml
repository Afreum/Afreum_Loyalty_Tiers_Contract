name: Build & Attest

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  id-token: write
  attestations: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}

      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/latest/download/stellar-cli-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          sudo mv stellar /usr/local/bin/stellar

      - name: Build WASM
        run: stellar contract build

      - name: Copy WASM
        run: |
          mkdir -p wasm
          cp target/wasm32v1-none/release/loyalty_tier.wasm wasm/

      # SEP-0055: creates a GitHub Attestation linking the WASM hash to this
      # repo and commit — verifiable by anyone via GitHub API
      - name: Attest WASM (SEP-0055)
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: wasm/loyalty_tier.wasm

      - name: Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: loyalty_tier-${{ github.sha }}
          path: wasm/loyalty_tier.wasm
